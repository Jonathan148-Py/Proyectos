<header class="header">
  <div class="logo-container">
    <img src="assets/Logo-San-Bernardo.png" alt="Municipalidad de San Bernardo" class="logo-muni" />
    <img src="assets/logo.png" alt="Sistema de Alertas" class="logo-app" />
  </div>

  <div class="user-greeting">
    <span style="color: white">Bienvenido, <strong>{{ usuario?.nombre || 'Usuario' }}</strong> ({{ usuario?.rango || 'Invitado' }})</span>
    <button class="btn-logout" (click)="cerrarSesion()">🚪 Cerrar Sesión</button>
  </div>
</header>

<div class="main-content">

  <!-- MENÚ LATERAL -->
  <aside class="sidebar">
    <nav>
      <ul>
        <li>
          <a [routerLink]="['/menu']" routerLinkActive="active">
            <span class="icon">🏠</span> Menú
          </a>
        </li>
        <li *ngIf="puedeVer('alertasvecinales') && !isCurrentRoute('/alertasvecinales')">
          <a [routerLink]="['/alertasvecinales']" routerLinkActive="active">
            <span class="icon">🚨</span> Alertas Vecinales
          </a>
        </li>
        <li *ngIf="puedeVer('camarassolicitadas')">
          <a [routerLink]="['/camarassolicitadas']" routerLinkActive="active">
            <span class="icon">📹</span> Cámaras Solicitadas
          </a>
        </li>
        <li *ngIf="puedeVer('mapa')">
          <a [routerLink]="['/mapa']" routerLinkActive="active">
            <span class="icon">🗺️</span> Mapa en Vivo
          </a>
        </li>
        <li *ngIf="puedeVer('multas')">
          <a [routerLink]="['/multas']" routerLinkActive="active">
            <span class="icon">💰</span> Multas
          </a>
        </li>
        <li *ngIf="puedeVer('crearusuario')">
          <a [routerLink]="['/crearusuario']" routerLinkActive="active">
            <span class="icon">👥</span> Crear Usuario
          </a>
        </li>
        <li>
          <a [routerLink]="['/listadeusuarios']" routerLinkActive="active">
            <span class="icon">📋</span> Lista de Usuarios
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main-area">
    <div class="mapa-container">
      <div class="mapa-header">
        <h2>
          <span class="icon">🗺️</span> Mapa en Vivo - San Bernardo
        </h2>
        <div class="mapa-actions">
          <button class="btn-primary" (click)="centrarEnSanBernardo()">
            📍 Centrar en San Bernardo
          </button>
        </div>
      </div>
      <div id="map" class="mapa"></div>
    </div>
  </main>
</div>
